# OPTIONAL, MANUAL-ONLY Vercel deploy for LessonPilot.
#
# You deploy LessonPilot through Vercel's Git integration (auto-deploy on push
# to `main` and on pull requests), so you normally do NOT need this workflow.
# It is kept as an on-demand escape hatch and runs ONLY when you trigger it
# from the Actions tab (workflow_dispatch) — so it will never double-deploy
# against the Git integration.
#
# Requires three repository secrets
# (GitHub repo > Settings > Secrets and variables > Actions > New secret):
#   VERCEL_TOKEN       -> https://vercel.com/account/tokens
#   VERCEL_ORG_ID      -> run `vercel link`, then read .vercel/project.json ("orgId")
#   VERCEL_PROJECT_ID  -> run `vercel link`, then read .vercel/project.json ("projectId")
name: Vercel Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        type: choice
        default: preview
        options:
          - preview
          - production

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to Vercel (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=${{ inputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build ${{ inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy project artifacts to Vercel
        run: vercel deploy --prebuilt ${{ inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
