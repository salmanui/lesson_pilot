name: Vercel Deploy

# Deploys the app to Vercel using the Vercel CLI.
#   - Pull requests            -> Preview deployment
#   - Pushes to the main branch -> Production deployment
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   VERCEL_TOKEN       - Account token from https://vercel.com/account/tokens
#   VERCEL_ORG_ID      - From .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID  - From .vercel/project.json after `vercel link`
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  NEXT_TELEMETRY_DISABLED: '1'

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----- Preview deploy for pull requests -----
  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: preview
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "Preview URL: $url"
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"
        id: deploy

  # ----- Production deploy for pushes to main -----
  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
