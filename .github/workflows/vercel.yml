# Deploys LessonPilot to Vercel PRODUCTION on every push to `main`.
#
# Vercel's Git integration is disabled in vercel.json ("git.deploymentEnabled":
# false), so this workflow is the single deploy path — no duplicate deploys.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN      — create at https://vercel.com/account/tokens
#   VERCEL_ORG_ID     — Vercel project → Settings → General
#   VERCEL_PROJECT_ID — Vercel project → Settings → General
name: Vercel Production Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# Deploy commits one at a time, in order; never cancel an in-flight production
# deploy (cancelling mid-deploy is worse than a short queue).
concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
