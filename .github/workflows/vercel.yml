# Deploys LessonPilot to Vercel PRODUCTION on every push to `main`.
#
# Vercel's Git integration is disabled in vercel.json ("git.deploymentEnabled":
# false), so this workflow is the single deploy path — no duplicate deploys.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN      — create at https://vercel.com/account/tokens
#   VERCEL_ORG_ID     — Vercel project → Settings → General
#   VERCEL_PROJECT_ID — Vercel project → Settings → General
name: Vercel Production Deployment

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# Deploy commits one at a time, in order; never cancel an in-flight production
# deploy (cancelling mid-deploy is worse than a short queue).
concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy-production:
    # Guard: production deploys only ever come from `main`, even when the
    # workflow is dispatched manually from another branch in the Actions UI.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Pinned (not @latest) so a compromised or broken CLI release can't run
      # with the VERCEL_TOKEN in scope. Bump the version deliberately.
      - name: Install Vercel CLI
        run: npm install --global vercel@56.1.0

      - name: Validate Deployment Secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        shell: bash
        run: |
          invalid=0

          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            value="${!name:-}"

            if [[ -z "$value" ]]; then
              echo "::error::$name is missing. Add it under Settings > Secrets and variables > Actions."
              invalid=1
            elif [[ "$value" =~ [[:space:]] ]]; then
              echo "::error::$name contains whitespace. Paste only the value, without quotes or line breaks."
              invalid=1
            fi
          done

          if (( invalid )); then
            exit 1
          fi

      # Vercel recommends VERCEL_TOKEN for CI instead of a --token argument,
      # which can be visible in command lines and process listings.
      - name: Authenticate Vercel CLI
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel whoami

      - name: Pull Vercel Environment Information
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production

      - name: Build Project Artifacts
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod

      - name: Deploy Project Artifacts to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod
