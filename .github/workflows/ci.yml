# CI for LessonPilot — a Next.js SERVER app (next.config.js uses output: 'standalone').
#
# This workflow does NOT deploy. Deployment happens in
# .github/workflows/vercel.yml, which deploys to Vercel production on every
# push to `main` (Vercel's own Git integration is disabled in vercel.json).
# The job below only lints and builds so a broken commit is caught early,
# independently of Vercel.
#
# NOTE: This is intentionally different from a "Deploy to GitHub Pages" workflow.
# GitHub Pages only serves static files and needs `output: 'export'` (an `out/`
# folder). LessonPilot is server-rendered, so Pages is not an option here.
name: Next.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        # Public build-time vars are read from the committed `.env`
        # (NEXT_PUBLIC_* values are client-exposed, not secrets). If you ever
        # move real secrets out of `.env`, add them as GitHub Actions secrets
        # and re-expose them here via an `env:` block.
